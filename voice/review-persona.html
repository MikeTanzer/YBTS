<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yako Voice — Personality Clip Review</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;margin:0;background:#10212e;color:#eaf2f8}
  header{position:sticky;top:0;background:#0c1a24;padding:14px 18px;box-shadow:0 2px 10px rgba(0,0,0,.4);z-index:5}
  h1{margin:0 0 8px;font-size:18px}
  select,button{font-size:15px;border-radius:8px;border:0;padding:8px 12px;cursor:pointer}
  select{background:#0c1a24;color:#fff;border:1px solid #355}
  button{background:#2f8fd0;color:#fff}
  button.alt{background:#3a5160}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
  main{padding:14px 18px;max-width:720px}
  table{border-collapse:collapse;width:100%;font-size:14px}
  td,th{border-bottom:1px solid #24414f;padding:8px;text-align:left}
  tr.playing{background:#1d3a4a}
  tr.flag{background:#3a1d23}
  textarea{width:100%;height:60px;background:#0c1a24;color:#bfe;border:1px solid #355;border-radius:8px;padding:8px;font-family:monospace}
  .hint{color:#9fc7e0;font-size:13px}
</style></head>
<body>
<header>
  <h1>🎙️ Personality Clip Review</h1>
  <div class="row">
    <label>Language <select id="lang"><option value="en">English</option><option value="fr">Français</option><option value="es">Español</option></select></label>
    <label>Character <select id="per"><option value="mom">Mom (Isabella)</option><option value="dad">Dad (Mark)</option><option value="grandpa">Grandpa (Brooks)</option><option value="grandma">Grandma (Mabel)</option></select></label>
    <button id="all">▶︎ Play all</button>
    <button class="alt" id="export">Export flagged ✗</button>
  </div>
  <p class="hint">Pick a language + character, listen to each line, and tick "wrong" on any that's mis-cut (cut off, two lines merged, etc.). Export and paste the list to me — I'll regenerate just those.</p>
  <textarea id="out" placeholder="Flagged clips appear here…"></textarea>
</header>
<main><table id="tbl"><tbody></tbody></table></main>
<script>
const KEYS=[["cheer_1","Cheer 1 — short praise (e.g. “Great job!”)"],["cheer_2","Cheer 2 (e.g. “Woohoo, you did it!”)"],["cheer_3","Cheer 3 (e.g. “Amazing! High five!”)"],["try","Try again (e.g. “Oops! Let’s try again…”)"],["level","Level complete (e.g. “Five stars!…”)"],["greet","Greeting (e.g. “Hi! Let’s learn and play!”)"]];
const tb=document.querySelector("#tbl tbody"); const flags=new Set(); const au=new Audio(); let seqAll=false, idx=0;
function path(k){ return "clips/"+document.getElementById("lang").value+"/"+document.getElementById("per").value+"/"+k+".mp3"; }
function tag(){ return document.getElementById("lang").value+"/"+document.getElementById("per").value; }
function render(){
  tb.innerHTML="";
  KEYS.forEach(([k,desc],i)=>{
    const id=tag()+"/"+k; const tr=tb.insertRow(); tr.dataset.i=i;
    if(flags.has(id)) tr.classList.add("flag");
    tr.innerHTML=`<td><button data-i="${i}">▶</button></td><td><b>${k}</b><br><span class=hint>${desc}</span></td>`+
      `<td><label><input type=checkbox data-k="${k}" ${flags.has(id)?'checked':''}> wrong</label></td>`;
  });
}
function play(i){ idx=i; document.querySelectorAll("tr.playing").forEach(r=>r.classList.remove("playing"));
  const r=[...tb.rows].find(x=>x.dataset.i==i); if(r)r.classList.add("playing");
  au.src=path(KEYS[i][0]); au.play(); }
au.onended=()=>{ if(seqAll && idx<KEYS.length-1) setTimeout(()=>play(idx+1),300); else seqAll=false; };
document.getElementById("tbl").onclick=e=>{const b=e.target.closest("button[data-i]"); if(b){seqAll=false; play(+b.dataset.i);}};
document.getElementById("tbl").onchange=e=>{const c=e.target.closest("input[data-k]"); if(c){const id=tag()+"/"+c.dataset.k; c.checked?flags.add(id):flags.delete(id); c.closest("tr").classList.toggle("flag",c.checked);}};
document.getElementById("all").onclick=()=>{seqAll=true; play(0);};
document.getElementById("lang").onchange=render; document.getElementById("per").onchange=render;
document.getElementById("export").onclick=()=>{document.getElementById("out").value=[...flags].join("\n")||"(none flagged — all good!)";};
render();
</script>
</body></html>
