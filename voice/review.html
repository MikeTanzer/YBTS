<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yako Voice — Clip Review</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;margin:0;background:#10212e;color:#eaf2f8}
  header{position:sticky;top:0;background:#0c1a24;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.4);z-index:5}
  h1{margin:0 0 8px;font-size:18px}
  button{background:#2f8fd0;color:#fff;border:0;border-radius:8px;padding:8px 13px;font-size:14px;cursor:pointer}
  button.alt{background:#3a5160}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  main{padding:8px 16px;max-width:760px}
  table{border-collapse:collapse;width:100%;font-size:14px}
  td,th{border-bottom:1px solid #24414f;padding:6px 8px;text-align:left}
  tr.playing{background:#1d3a4a}
  tr.flag{background:#3a1d23}
  .sec{color:#7fb6da;font-weight:700;padding-top:12px}
  .id{color:#88a;font-family:monospace;font-size:12px}
  textarea{width:100%;height:70px;background:#0c1a24;color:#bfe;border:1px solid #355;border-radius:8px;padding:8px;font-family:monospace}
</style></head>
<body>
<header>
  <h1>🔎 Yako Voice — Clip Review</h1>
  <div class="row">
    <button id="all">▶︎ Play all in order</button>
    <button class="alt" id="stop">■ Stop</button>
    <label>speed <select id="sp"><option>1</option><option>0.85</option></select></label>
    <button class="alt" id="export">Export flagged ✗</button>
    <span id="status"></span>
  </div>
  <textarea id="out" placeholder="Flagged (wrong) clip ids show here…"></textarea>
</header>
<main><table id="tbl"><tbody></tbody></table></main>
<script>
const CLIPS=[["let_A","A"],["let_B","B"],["let_C","C"],["let_D","D"],["let_E","E"],["let_F","F"],["let_G","G"],["let_H","H"],["let_I","I"],["let_J","J"],["let_K","K"],["let_L","L"],["let_M","M"],["let_N","N"],["let_O","O"],["let_P","P"],["let_Q","Q"],["let_R","R"],["let_S","S"],["let_T","T"],["let_U","U"],["let_V","V"],["let_W","W"],["let_X","X"],["let_Y","Y"],["let_Z","Z"],
["num_0","zero"],["num_1","one"],["num_2","two"],["num_3","three"],["num_4","four"],["num_5","five"],["num_6","six"],["num_7","seven"],["num_8","eight"],["num_9","nine"],
["frag_find_letter","Find the letter"],["frag_find_number","Find the number"],["frag_now_letter","Now find the letter"],["frag_now_number","Now find the number"],["frag_great_letter","Great! Now find the letter"],["frag_great_number","Great! Now find the number"],["frag_starts_with","Find the letter it starts with"],["frag_spell","Let's spell a word! Find the letter"],["frag_make_number","Let's make a number! Find the number"],["frag_thats_letter","That's the letter"],["frag_thats_number","That's the number"],["frag_canyou_letter","Can you find the letter"],["frag_canyou_number","Can you find the number"],
["name_red","Red"],["name_orange","Orange"],["name_yellow","Yellow"],["name_green","Green"],["name_blue","Blue"],["name_purple","Purple"],["name_pink","Pink"],["name_brown","Brown"],["name_circle","Circle"],["name_square","Square"],["name_triangle","Triangle"],["name_heart","Heart"],["name_star","Star"],["name_diamond","Diamond"],["name_cat","Cat"],["name_dog","Dog"],["name_elephant","Elephant"],["name_frog","Frog"],["name_giraffe","Giraffe"],["name_horse","Horse"],["name_lion","Lion"],["name_monkey","Monkey"],["name_owl","Owl"],["name_pig","Pig"],["name_rabbit","Rabbit"],["name_snake","Snake"],["name_tiger","Tiger"],["name_zebra","Zebra"],
["cheer_1","Great job!"],["cheer_2","Awesome!"],["cheer_3","You did it!"],["cheer_4","Way to go!"],["cheer_5","Woohoo!"],["cheer_6","Nice work!"],["cheer_7","Amazing!"],["cheer_8","You're a superstar!"],["cheer_9","You rock!"],["cheer_10","Yes!"],["cheer_11","Fantastic!"],["cheer_12","High five!"],
["try_oops","Oops!"],["try_notquite","Not quite!"],["try_almost","Almost!"],["try_goodtry","Good try!"],["try_again","Let's try that again!"],
["done_youdidit","You did it!"],["done_yougotit","You got it!"],["done_hooray","Hooray!"],["done_spelledit","You spelled it!"],["done_madenumber","You made the number!"],
["lvl_fivestars","Five stars!"],["lvl_finished","You finished the level!"],["lvl_complete","Woohoo! Level complete!"],
["misc_findkey","Look closely and find the key!"],["misc_hi","Let's play with Yako!"],["misc_tap","Tap any key to play!"]];
const SECTIONS={0:"LETTERS",26:"NUMBERS",36:"FRAGMENTS",49:"PICTURE NAMES",77:"CHEERS",89:"TRY AGAIN",94:"WORD/NUMBER DONE",99:"LEVEL COMPLETE",102:"MISC"};
const tb=document.querySelector("#tbl tbody"); const flags=new Set();
let au=new Audio(), seq=-1, playingAll=false;
CLIPS.forEach(([id,txt],i)=>{
  if(SECTIONS[i]){const r=tb.insertRow();r.innerHTML=`<td colspan=4 class=sec>${SECTIONS[i]}</td>`;}
  const r=tb.insertRow(); r.dataset.i=i;
  r.innerHTML=`<td><button data-i="${i}">▶</button></td><td>${i+1}</td><td>${txt}</td><td><span class=id>${id}</span> &nbsp; <label><input type=checkbox data-f="${id}"> wrong</label></td>`;
});
function play(i){
  seq=i; document.querySelectorAll("tr.playing").forEach(r=>r.classList.remove("playing"));
  const r=[...tb.rows].find(x=>x.dataset.i==i); if(r){r.classList.add("playing"); r.scrollIntoView({block:"center",behavior:"smooth"});}
  au.src="clips/"+CLIPS[i][0]+".mp3"; au.playbackRate=parseFloat(document.querySelector("#sp").value); au.play();
  document.querySelector("#status").textContent=`${i+1}/105  ${CLIPS[i][1]}`;
}
au.onended=()=>{ if(playingAll && seq<CLIPS.length-1) setTimeout(()=>play(seq+1),350); else if(seq>=CLIPS.length-1) playingAll=false; };
document.querySelector("#tbl").onclick=e=>{ const b=e.target.closest("button[data-i]"); if(b){playingAll=false; play(+b.dataset.i);} };
document.querySelector("#tbl").onchange=e=>{ const c=e.target.closest("input[data-f]"); if(c){ const id=c.dataset.f; c.checked?flags.add(id):flags.delete(id); c.closest("tr").classList.toggle("flag",c.checked);} };
document.querySelector("#all").onclick=()=>{playingAll=true; play(0);};
document.querySelector("#stop").onclick=()=>{playingAll=false; au.pause();};
document.querySelector("#export").onclick=()=>{ document.querySelector("#out").value=[...flags].join(", ")||"(none flagged — all good!)"; };
</script>
</body></html>
